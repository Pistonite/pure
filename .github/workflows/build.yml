name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Check & Test & Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: Pistonight/mono-dev/actions/setup@new_setup
        with:
          mono-dev: new_setup
          ecma-pnpm: true
      - run: task install
      - run: task check
      - run: task test
      - run: task build

  build-docs:
    name: Build Docs
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: Pistonight/mono-dev/actions/setup@new_setup
        with:
          mono-dev: new_setup
          ecma-pnpm: true
      - run: task install
      - run: task doc
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs
          retention-days: 3

  deploy-docs:
    name: Deploy Docs
    needs:
      - build-docs
    if: github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
